name: Publish Plugin to Gradle Portal

on:
  release:
    types: [published] 
  workflow_dispatch: # 允许手动触发（方便测试）


jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      # 1. 拉取代码
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. 设置 JDK 环境（根据你插件的兼容性，这里使用 JDK 17）
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      # 3. 缓存 Gradle 依赖，加速后续构建
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      # 4. 给 gradlew 赋予执行权限（防止 Windows 环境提交的代码丢失权限）
      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      # 5. 执行发布命令，并通过参数将 GitHub Secrets 注入到 Gradle 中
      - name: Publish Plugin
        run: |
          ./gradlew publishPlugins \
            -Pgradle.publish.key=${{ secrets.GRADLE_PUBLISH_KEY }} \
            -Pgradle.publish.secret=${{ secrets.GRADLE_PUBLISH_SECRET }}
